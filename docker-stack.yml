version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hydash
      POSTGRES_USER: hydash
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hydash']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hydash-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-hydash}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-hydash}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hydash-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  backend:
    image: hydash-backend:latest
    environment:
      - DATABASE_URL=postgresql://hydash:${DB_PASSWORD:-hydash}@postgres:5432/hydash
      - REDIS_URL=redis://:${REDIS_PASSWORD:-hydash}@redis:6379
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - hydash_servers:/var/hydash/servers
      - hydash_backups:/var/hydash/backups
    depends_on:
      - postgres
      - redis
    networks:
      - hydash-net
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - hydash-net
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  frontend:
    image: hydash-frontend:latest
    networks:
      - hydash-net
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 32M

configs:
  nginx_conf:
    file: ./nginx.conf

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  db_password:
    file: ./secrets/db_password.txt

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  hydash_servers:
    driver: local
  hydash_backups:
    driver: local

networks:
  hydash-net:
    driver: overlay
    attachable: true